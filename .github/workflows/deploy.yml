name: Deploy

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 20
            cd ${{ secrets.DEPLOY_PATH }}
            trap 'php artisan up || true' EXIT

            echo "==> Fetching tested revision..."
            git fetch origin ${{ github.event.workflow_run.head_sha || github.sha }}
            git checkout --detach ${{ github.event.workflow_run.head_sha || github.sha }}

            echo "==> Entering maintenance mode..."
            php artisan down --retry=10

            echo "==> Installing PHP dependencies..."
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

            echo "==> Building frontend assets..."
            npm ci --no-audit --no-fund
            npm run build

            echo "==> Running migrations..."
            php artisan migrate --force --no-interaction
            php artisan storage:link --force

            echo "==> Caching config, routes, views..."
            php artisan optimize:clear
            php artisan optimize

            echo "==> Restarting queue workers..."
            php artisan queue:restart

            echo "==> Reloading PHP-FPM..."
            sudo systemctl reload php8.4-fpm

            echo "==> Exiting maintenance mode..."
            php artisan up

            echo "==> Verifying application health..."
            curl --fail --silent --show-error --retry 5 --retry-delay 2 "${{ secrets.HEALTHCHECK_URL }}"

            trap - EXIT

            echo "==> Done! Deployed successfully."
